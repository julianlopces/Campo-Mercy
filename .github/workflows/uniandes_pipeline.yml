name: Mercy Corps - Pipeline

on:
  schedule:
    - cron: "0 */2 * * *"   # Cada 2 horas (UTC)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mercy-alertas
  cancel-in-progress: true

jobs:
  run-alertas:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_ACTIONS: "true"
      SERVIDOR: ${{ secrets.SERVIDOR }}
      PASSWORD: ${{ secrets.PASSWORD }}
      EMAIL: ${{ secrets.EMAIL }}
      FORMID: ${{ secrets.FORMID }}
      IDALERTAS: ${{ secrets.IDALERTAS }}
      GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install system dependencies (sf)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          extra-packages: |
            pacman
            pak
            remotes

      - name: Run Mercy Corps pipeline
        run: |
          Rscript -e "sessionInfo()"
          Rscript Scripts/Mercy_Corps_Master_script.R