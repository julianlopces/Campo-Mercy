name: Mercy Corps - Pipeline

on:
  schedule:
    - cron: "0 */2 * * *" # cada 2 horas (UTC)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: mercy-alertas
  cancel-in-progress: true

jobs:
  run-alertas:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      GITHUB_ACTIONS: "true"
      SERVIDOR: ${{ secrets.SERVIDOR }}
      PASSWORD: ${{ secrets.PASSWORD }}
      EMAIL: ${{ secrets.EMAIL }}
      FORMID: ${{ secrets.FORMID }}
      IDALERTAS: ${{ secrets.IDALERTAS }}
      GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install pak
        run: |
          Rscript -e 'if (!requireNamespace("pak", quietly = TRUE)) install.packages("pak", repos = "https://cloud.r-project.org")'

      - name: Install R packages (CRAN + GitHub)
        run: |
          Rscript -e 'pak::pkg_install(c(
            "pacman",
            "dplyr", "tidyr", "httr", "jsonlite",
            "readxl", "lubridate",
            "googledrive", "googlesheets4",
            "dotenv",
            "stringr",
            "julianlopces/odkmissing"
          ))'

      - name: Run Mercy Corps pipeline
        run: |
          Rscript -e "sessionInfo()"
          Rscript Scripts/Mercy_Corps_Master_script.R